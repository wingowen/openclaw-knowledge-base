<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>📈 股票深度分析看板</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --primary: #1a73e8;
  --bg: #f5f7fa;
  --card-bg: #ffffff;
  --text: #333333;
  --text-light: #666666;
  --border: #e0e0e0;
  --success: #2e7d32;
  --danger: #c62828;
  --warning: #ef6c00;
  --info: #1565c0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

.header {
  background: linear-gradient(135deg, var(--primary) 0%, #0d47a1 100%);
  color: white;
  padding: 20px 32px;
  box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
}
.header h1 { font-size: 24px; font-weight: 600; margin: 0; }
.header-sub { font-size: 14px; opacity: 0.9; margin-top: 4px; }

.container {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 20px;
  padding: 20px;
  max-width: 1600px;
  margin: 0 auto;
  height: calc(100vh - 80px);
}

.card {
  background: var(--card-bg);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.card h3 {
  margin: 0 0 16px 0;
  color: var(--primary);
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.stat-item {
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
  border-radius: 8px;
  padding: 16px;
  text-align: center;
  border: 1px solid var(--border);
}
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
}
.stat-label {
  font-size: 12px;
  color: var(--text-light);
  margin-top: 4px;
}

/* 侧边栏候选池列表 */
.sidebar { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
.sidebar .card { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-bottom: 0; }
.watchlist-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--primary); }
.watchlist-list {
  flex: 1;
  overflow-y: auto;
  margin-right: -8px;
  padding-right: 8px;
}

.stock-row {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  background: #f8f9fa;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s ease;
}
.stock-row:hover {
  background: #e3f2fd;
  border-color: var(--primary);
  transform: translateY(-1px);
  box-shadow: 0 4px 8px rgba(26, 115, 232, 0.15);
}
.stock-row.selected {
  background: #e3f2fd;
  border-color: var(--primary);
  font-weight: 500;
}
.stock-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.stock-name { font-weight: 600; font-size: 14px; }
.stock-code { font-size: 12px; color: var(--text-light); margin-left: 8px; }
.stock-pct { font-weight: 700; font-size: 14px; }
.positive { color: var(--danger); }
.negative { color: var(--success); }
.stock-meta {
  font-size: 12px;
  color: var(--text-light);
  display: flex;
  gap: 12px;
}
.bucket-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.bucket.进攻 { background: #e3f2fd; color: var(--info); }
.bucket.确认 { background: #e8f5e9; color: var(--success); }
.bucket.观察 { background: #fff3e0; color: var(--warning); }

/* 主内容区 */
.main { overflow-y: auto; padding-right: 8px; }
.main .card { min-height: 300px; }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}
.empty-state-icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.3;
}

/* 详情表格 */
.details-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}
.details-title { font-size: 18px; font-weight: 600; }
.details-summary { font-size: 13px; color: var(--text-light); }
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.data-table th {
  background: #f0f4f8;
  color: var(--text-light);
  font-weight: 600;
  padding: 10px 12px;
  text-align: left;
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
}
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #eee;
  vertical-align: middle;
}
.data-table tbody tr:hover { background: #f8f9fa; }
.data-table tbody tr:last-child td { border-bottom: none; }

/* 操作建议标签 */
.advice-tag {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
}
.advice.买入 { background: #e8f5e9; color: var(--success); }
.advice.加仓 { background: #e3f2fd; color: var(--info); }
.advice.持有 { background: #fff3e0; color: var(--warning); }
.advice.卖出 { background: #ffebee; color: var(--danger); }
.advice.减仓 { background: #fce4ec; color: #ad1457; }

/* 图表容器 */
.chart-container {
  position: relative;
  height: 280px;
  margin-top: 16px;
}
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 20px;
}

/* 响应式 */
@media (max-width: 1024px) {
  .container { grid-template-columns: 320px 1fr; }
  .chart-row { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .container { grid-template-columns: 1fr; padding: 12px; }
  .sidebar { height: auto; max-height: 500px; }
}
</style>
</head>
<body>
<div class="header">
  <h1>📈 股票深度分析看板</h1>
  <div class="header-sub">实时数据 · 可视化分析 · 智能决策</div>
</div>

<div class="container">
  <!-- 左侧：候选池列表 -->
  <div class="sidebar">
    <div class="card">
      <h3>🔍 候选池（最新日）</h3>
      <div class="watchlist-toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索股票名称或代码...">
      </div>
      <div class="watchlist-list" id="watchlist">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 右侧：图表 + 详情 -->
  <div class="main">
    <!-- 统计卡片 -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-item">
        <div class="stat-value" id="statWatchlist">0</div>
        <div class="stat-label">候选池数量</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statAnalysis">0</div>
        <div class="stat-label">分析记录数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statBuy">0</div>
        <div class="stat-label">买入建议次数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statAvgSentiment">0</div>
        <div class="stat-label">平均情绪分</div>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="card">
      <h3>📊 候选池分布</h3>
      <div class="chart-row">
        <div class="chart-container">
          <canvas id="bucketChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="sentimentChart"></canvas>
        </div>
      </div>
    </div>

    <!-- 深度分析详情 -->
    <div class="card">
      <div class="details-header">
        <div class="details-title" id="detailTitle">📋 深度分析</div>
        <div class="details-summary" id="detailSummary">请从左侧选择一只股票</div>
      </div>
      <div id="details">
        <div class="empty-state">
          <div class="empty-state-icon">👈</div>
          <p>点击左侧候选池中的股票，查看详细分析历史</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// 配置
const API_BASE = '/api'; // 如果独立运行请改为 '/api' 或完整 URL
let watchlistData = [];
let selectedCode = null;

// 图表实例
let bucketChart = null;
let sentimentChart = null;

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  loadDashboard();
  loadStats();
  setupSearch();
});

async function loadDashboard() {
  try {
    const res = await fetch(`${API_BASE}/dashboard`);
    const json = await res.json();
    watchlistData = json.latest_watchlist || [];
    renderWatchlist();
  } catch (e) {
    document.getElementById('watchlist').innerHTML =
      '<div class="empty-state">加载失败，请刷新重试</div>';
  }
}

async function loadStats() {
  try {
    const res = await fetch(`${API_BASE}/stats`);
    const json = await res.json();

    // 更新统计卡片
    document.getElementById('statWatchlist').textContent =
      json.watchlist_by_bucket ? Object.values(json.watchlist_by_bucket).reduce((a,b)=>a+b,0) : 0;
    document.getElementById('statAnalysis').textContent = json.analysis_count || 0;
    document.getElementById('statAvgSentiment').textContent = json.avg_sentiment || 0;

    // 获取买入建议总数（从 details 面板更新）
    // 先不设置，等选择股票后再更新

    // 渲染图表
    renderBucketChart(json.watchlist_by_bucket);
    renderSentimentChart(json.sentiment_distribution);
  } catch (e) {
    console.error('Stats load failed:', e);
  }
}

function renderBucketChart(data) {
  const ctx = document.getElementById('bucketChart').getContext('2d');
  const buckets = Object.keys(data);
  const counts = Object.values(data);
  const colors = {
    '进攻': '#1a73e8',
    '确认': '#2e7d32',
    '观察': '#ef6c00'
  };
  const bgColors = buckets.map(b => colors[b] || '#757575');

  if (bucketChart) bucketChart.destroy();

  bucketChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: buckets,
      datasets: [{
        label: '股票数量',
        data: counts,
        backgroundColor: bgColors,
        borderRadius: 6,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: true }
      },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f0f0f0' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderSentimentChart(dist) {
  const ctx = document.getElementById('sentimentChart').getContext('2d');
  const labels = dist.map((_, i) => `${i}分`);
  const colors = dist.map(c => c > 0 ? 'rgba(26, 115, 232, 0.75)' : '#e0e0e0');

  if (sentimentChart) sentimentChart.destroy();

  sentimentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '次数',
        data: dist,
        backgroundColor: colors,
        borderRadius: 4,
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f0f0f0' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderWatchlist() {
  const container = document.getElementById('watchlist');
  const query = document.getElementById('searchInput').value.toLowerCase();

  const filtered = watchlistData.filter(s =>
    s.name.toLowerCase().includes(query) ||
    s.code.toLowerCase().includes(query)
  );

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">暂无候选池数据</div>';
    return;
  }

  let html = '';
  filtered.forEach(stock => {
    const pct = stock.chg_pct ? `${stock.chg_pct > 0 ? '+' : ''}stock.chg_pct}%` : '-';
    const pctClass = stock.chg_pct >= 0 ? 'positive' : 'negative';
    const bucketClass = stock.bucket || '';
    html += `
      <div class="stock-row" onclick="loadDetails('${stock.code}')" data-code="${stock.code}">
        <div class="stock-header">
          <div>
            <span class="stock-name">${stock.name}</span>
            <span class="stock-code">${stock.code}</span>
          </div>
          <div class="stock-pct ${pctClass}">${pct}</div>
        </div>
        <div class="stock-meta">
          <span>${stock.sector || '-'}</span>
          <span class="bucket-tag ${bucketClass}">${stock.bucket || '-'}</span>
        </div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  let debounce;
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(renderWatchlist, 200);
  });
}

async function loadDetails(code) {
  const detailsDiv = document.getElementById('details');
  const summary = document.getElementById('detailSummary');

  // 高亮选中
  selectedCode = code;
  document.querySelectorAll('.stock-row').forEach(el => {
    el.classList.toggle('selected', el.dataset.code === code);
  });

  // 更新标题
  const stock = watchlistData.find(s => s.code === code);
  document.getElementById('detailTitle').textContent =
    stock ? `📊 ${stock.name} (${stock.code})` : '📊 深度分析';

  detailsDiv.innerHTML = '<div class="loading">加载中...</div>';

  try {
    const res = await fetch(`${API_BASE}/stock-details?code=${code}`);
    const json = await res.json();

    if (json.error) {
      detailsDiv.innerHTML = `<div class="empty-state">${json.error}</div>`;
      summary.textContent = '无法加载数据';
      return;
    }

    // 更新统计卡片中的买入次数
    document.getElementById('statBuy').textContent = json.buy_count || 0;

    summary.textContent =
      `共 ${json.total} 条记录 · 买入 ${json.buy_count} 次 · 卖出 ${json.sell_count} 次 · 平均情绪 ${json.avg_sentiment}`;

    renderDetails(json);
  } catch (e) {
    detailsDiv.innerHTML = `<div class="empty-state">请求失败: ${e.message}</div>`;
    summary.textContent = '加载失败';
  }
}

function renderDetails(d) {
  const container = document.getElementById('details');
  if (d.total === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📭</div>
        <p>该股票暂无深度分析历史</p>
      </div>`;
    return;
  }

  let html = `
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>日期</th><th>建议</th><th>情绪分</th>
            <th>理想买点</th><th>次优买点</th><th>止损</th><th>目标位</th>
          </tr>
        </thead>
        <tbody>
  `;

  // 倒序显示（最新的在前）
  [...d.records].reverse().forEach(r => {
    const day = r.created_at ? r.created_at.substring(0, 10) : '-';
    const time = r.created_at ? r.created_at.substring(11, 16) : '';
    const adviceClass = r.operation_advice || '';
    html += `
      <tr>
        <td>${day}<br><small style="color:#999">${time}</small></td>
        <td><span class="advice-tag ${adviceClass}">${r.operation_advice || '-'}</span></td>
        <td>${r.sentiment_score ?? '-'}</td>
        <td>${r.ideal_buy ?? '-'}</td>
        <td>${r.secondary_buy ?? '-'}</td>
        <td style="color:var(--danger)">${r.stop_loss ?? '-'}</td>
        <td style="color:var(--success)">${r.take_profit ?? '-'}</td>
      </tr>
    `;
  });

  html += '</tbody></table></div>';
  container.innerHTML = html;
}
</script>
</body>
</html>
